name: "AI Code Review Action Provider Can Vary"
description: "Perform code reviews and comment on diffs using AI (OpenAI, Anthropic, or Gemini)."
inputs:
  GITHUB_TOKEN:
    description: "GitHub token to interact with the repository."
    required: true
  API_KEY:
    description: "API key for the AI provider (OpenAI, Anthropic, or Gemini)."
    required: false
    default: ""
  API_PROVIDER:
    description: "AI provider to use: openai, anthropic, or gemini."
    required: false
    default: "openai"
  API_MODEL:
    description: "AI model name (e.g., gpt-4, claude-sonnet-4-20250514, gemini-pro)."
    required: false
    default: "gpt-4"
  API_BASE_URL:
    description: "Custom API base URL (overrides the provider default endpoint)."
    required: false
    default: ""
  MAX_TOKENS:
    description: "Maximum number of tokens for the AI model response."
    required: false
    default: "16384"
  exclude:
    description: "Glob patterns to exclude files from the diff analysis"
    required: false
    default: ""
  # Deprecated: use API_KEY instead
  OPENAI_API_KEY:
    description: "(Deprecated: use API_KEY) OpenAI API key."
    required: false
    default: ""
  # Deprecated: use API_MODEL instead
  OPENAI_API_MODEL:
    description: "(Deprecated: use API_MODEL) OpenAI API model."
    required: false
    default: ""
runs:
  using: "node20"
  main: "dist/index.js"
branding:
  icon: "aperture"
  color: "green"
